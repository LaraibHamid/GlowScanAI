# ======================================================
# PROJECT INFO
# ======================================================

name: glowscanai_new

description: "An AI-powered skincare analysis app that detects, tracks, and improves your skin health using advanced machine learning and smart recommendations."

publish_to: 'none'

version: 1.0.0+1



# ======================================================
# ENVIRONMENT
# ======================================================

environment:
  sdk: ^3.8.1



# ======================================================
# DEPENDENCIES
# ======================================================

dependencies:

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8



  # --------------------------------------------------
  # UI / ANIMATION
  # --------------------------------------------------

  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.70.0



  # --------------------------------------------------
  # MEDIA
  # --------------------------------------------------

  camera: ^0.11.0+2
  image_picker: ^1.1.2



  # --------------------------------------------------
  # VOICE
  # --------------------------------------------------

  speech_to_text: ^7.3.0



  # --------------------------------------------------
  # FIREBASE
  # --------------------------------------------------

  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_storage: ^12.0.0
  cloud_firestore: ^5.0.1



  # --------------------------------------------------
  # GOOGLE SIGN-IN
  # --------------------------------------------------

  google_sign_in: ^6.2.1



  # --------------------------------------------------
  # LOCAL STORAGE
  # --------------------------------------------------

  shared_preferences: ^2.2.3



  # --------------------------------------------------
  # EXTERNAL LINKS
  # --------------------------------------------------

  url_launcher: ^6.3.1



  # --------------------------------------------------
  # APP ICON GENERATOR
  # --------------------------------------------------

  flutter_launcher_icons: ^0.14.4



  # --------------------------------------------------
  # API CALLS
  # --------------------------------------------------

  http: ^1.2.1



# ======================================================
# DEV DEPENDENCIES
# ======================================================

dev_dependencies:

  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0



# ======================================================
# FLUTTER CONFIG
# ======================================================

flutter:

  uses-material-design: true

  assets:
    - assets/images/



# ======================================================
# APP ICON CONFIGURATION
# NOTE: Must NOT be inside "flutter"
# ======================================================

flutter_launcher_icons:

  android: true
  ios: true

  image_path: "assets/images/logo.about.jpeg"

  min_sdk_android: 21
